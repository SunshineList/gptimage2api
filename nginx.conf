worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. 定义速率限制区域 (10MB 内存，每秒允许 2 次请求)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;
    # 限制单个 IP 的并发连接数
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

    server {
        listen 80;
        server_name localhost;

        # 关键修复：防止 Nginx 在重定向时丢失端口号或强制跳转 HTTP
        absolute_redirect off;
        port_in_redirect off;

        # 2. 安全防护头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        root /usr/share/nginx/html;
        index index.html;

        # API Proxy
        location ~ ^/(v1|api|auth|version|images) {
            # 3. 应用速率限制 (允许 10 个突发，不排队)
            limit_req zone=api_limit burst=10 nodelay;
            limit_conn addr_limit 5;

            proxy_pass http://127.0.0.1:8000;
            # 使用 $http_host 以保留原始请求的端口
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 支持流式输出 (SSE)
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;

            # Increase upload size for image edits
            client_max_body_size 50M;
        }

        # Static files and SPA fallback
        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        # Custom 404
        error_page 404 /index.html;
    }
}
